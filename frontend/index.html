<!DOCTYPE html>
<html lang="en" data-mantine-color-scheme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/icon-mask.svg" color="#0e0f12" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0e0f12" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#fafaf7" media="(prefers-color-scheme: light)" />
    <title>Permify UI</title>
    <script data-mantine-script>
      try {
        var _colorScheme = window.localStorage.getItem('permify-ui-color-scheme');
        var colorScheme = _colorScheme === 'dark' ? 'dark' : 'light';
        window.localStorage.setItem('permify-ui-color-scheme', colorScheme);
        document.documentElement.setAttribute('data-mantine-color-scheme', colorScheme);
      } catch (e) {}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
